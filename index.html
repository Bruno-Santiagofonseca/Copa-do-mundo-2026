<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Álbum Copa 2026 ⚽</title>
  <meta name="theme-color" content="#009C3B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --verde: #009C3B;
      --amarelo: #FFDF00;
      --azul: #002776;
      --branco: #FFFFFF;
      --gramado: #15803D;
      --cinza-claro: #F3F4F6;
      --faltando: #E5E7EB;
      --colada: #22C55E;
      --repetida: #3B82F6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #0A192F;
      background-image: radial-gradient(var(--azul) 20%, transparent 80%);
      background-size: 100% 100%;
      color: #333;
      padding-bottom: 90px;
    }

    .header {
      background: linear-gradient(180deg, var(--verde), var(--gramado));
      color: var(--branco);
      padding: 20px 15px;
      border-radius: 0 0 28px 28px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      text-align: center;
      border-bottom: 4px solid var(--amarelo);
    }

    .profile-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 15px;
    }

    .avatar-container {
      position: relative;
      width: 75px;
      height: 75px;
      cursor: pointer;
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 4px solid var(--amarelo);
      object-fit: cover;
      background-color: var(--azul);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .avatar-emoji {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      border: 4px solid var(--amarelo);
      background-color: var(--azul);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      cursor: pointer;
    }

    .user-info h1 {
      font-size: 1.4rem;
      font-weight: 700;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
    }

    .user-info p {
      font-size: 0.85rem;
      opacity: 0.9;
    }

    .stats-bar {
      display: flex;
      justify-content: space-around;
      background: rgba(0,0,0,0.2);
      border-radius: 16px;
      padding: 12px 10px;
      margin-top: 10px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--amarelo);
    }

    .stat-label {
      font-size: 0.7rem;
      opacity: 0.85;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .progress-container {
      margin-top: 12px;
      padding: 0 5px;
    }

    .progress-bar-bg {
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      height: 12px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--amarelo), #FFA500);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .progress-text {
      font-size: 0.75rem;
      margin-top: 4px;
      opacity: 0.9;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 15px 10px 5px;
    }

    .tab-btn {
      padding: 8px 18px;
      border: none;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255,255,255,0.1);
      color: var(--branco);
    }

    .tab-btn.active {
      background: var(--amarelo);
      color: var(--azul);
    }

    .search-filter {
      padding: 10px 15px;
      display: flex;
      gap: 8px;
    }

    .search-input {
      flex: 1;
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: var(--branco);
      font-size: 0.9rem;
      outline: none;
    }

    .search-input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .filter-btn {
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: var(--branco);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: var(--verde);
    }

    .section {
      padding: 10px 15px;
    }

    .section-title {
      color: var(--amarelo);
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 8px;
    }

    .sticker {
      aspect-ratio: 2/3;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      border: 2px solid transparent;
      font-size: 0.7rem;
      font-weight: 600;
      text-align: center;
      padding: 4px;
      user-select: none;
    }

    .sticker:active {
      transform: scale(0.92);
    }

    .sticker.faltando {
      background: var(--faltando);
      color: #9CA3AF;
      border-color: #D1D5DB;
    }

    .sticker.colada {
      background: linear-gradient(135deg, #DCFCE7, #BBF7D0);
      color: var(--gramado);
      border-color: var(--colada);
      box-shadow: 0 2px 8px rgba(34,197,94,0.3);
    }

    .sticker.repetida {
      background: linear-gradient(135deg, #DBEAFE, #BFDBFE);
      color: #1D4ED8;
      border-color: var(--repetida);
      box-shadow: 0 2px 8px rgba(59,130,246,0.3);
    }

    .sticker-number {
      font-size: 1rem;
      font-weight: 800;
      line-height: 1;
    }

    .sticker-flag {
      font-size: 1.4rem;
      line-height: 1;
    }

    .sticker-name {
      font-size: 0.55rem;
      line-height: 1.2;
      margin-top: 2px;
    }

    .sticker-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--repetida);
      color: white;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #0A192F;
      border-top: 2px solid var(--azul);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 12px;
      z-index: 100;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 0.65rem;
      cursor: pointer;
      padding: 5px 15px;
      border-radius: 12px;
      transition: all 0.2s;
    }

    .nav-btn.active {
      color: var(--amarelo);
    }

    .nav-btn span:first-child {
      font-size: 1.4rem;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #1E3A5F;
      border-radius: 24px 24px 0 0;
      padding: 20px;
      width: 100%;
      max-width: 500px;
      color: var(--branco);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      margin: 0 auto 15px;
    }

    .modal-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 15px;
      color: var(--amarelo);
    }

    .modal-sticker-info {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .modal-sticker-preview {
      width: 70px;
      height: 105px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      background: rgba(255,255,255,0.1);
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .modal-btn {
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-colar {
      background: var(--colada);
      color: white;
    }

    .btn-repetida {
      background: var(--repetida);
      color: white;
    }

    .btn-remover {
      background: rgba(255,255,255,0.1);
      color: var(--branco);
    }

    .btn-fechar {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6);
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .troca-section {
      padding: 15px;
    }

    .troca-card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 12px;
    }

    .troca-card h3 {
      color: var(--amarelo);
      margin-bottom: 10px;
      font-size: 0.95rem;
    }

    .troca-stickers {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .troca-sticker-chip {
      background: var(--repetida);
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: rgba(255,255,255,0.5);
    }

    .empty-state .emoji {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .config-section {
      padding: 15px;
    }

    .config-card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 12px;
    }

    .config-card h3 {
      color: var(--amarelo);
      margin-bottom: 12px;
      font-size: 0.95rem;
    }

    .config-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: all 0.2s;
    }

    .btn-danger {
      background: #EF4444;
      color: white;
    }

    .btn-success {
      background: var(--verde);
      color: white;
    }

    .btn-info {
      background: var(--azul);
      color: white;
    }

    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.9rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 300;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .country-group {
      margin-bottom: 20px;
    }

    .country-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
    }

    .country-flag {
      font-size: 1.5rem;
    }

    .country-name {
      color: var(--branco);
      font-weight: 600;
      font-size: 0.9rem;
      flex: 1;
    }

    .country-progress {
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="profile-area">
      <div class="avatar-emoji" id="avatarDisplay" onclick="changeAvatar()">⚽</div>
      <div class="user-info">
        <h1 id="userName">Meu Álbum Copa 2026</h1>
        <p>🏆 FIFA World Cup 2026</p>
      </div>
    </div>
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="totalColadas">0</div>
        <div class="stat-label">Coladas</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="totalFaltando">0</div>
        <div class="stat-label">Faltando</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="totalRepetidas">0</div>
        <div class="stat-label">Repetidas</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="totalPercent">0%</div>
        <div class="stat-label">Completo</div>
      </div>
    </div>
    <div class="progress-container">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
      </div>
      <div class="progress-text" id="progressText">0 de 0 figurinhas coladas</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('album')">📖 Álbum</button>
    <button class="tab-btn" onclick="switchTab('trocas')">🔄 Trocas</button>
    <button class="tab-btn" onclick="switchTab('config')">⚙️ Config</button>
  </div>

  <!-- Search & Filter -->
  <div class="search-filter" id="searchBar">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Buscar figurinha..." oninput="filterStickers()">
    <button class="filter-btn" id="filterAll" onclick="setFilter('all')" style="background: var(--verde);">Todas</button>
    <button class="filter-btn" id="filterMissing" onclick="setFilter('faltando')">Faltam</button>
    <button class="filter-btn" id="filterDupe" onclick="setFilter('repetida')">Repetidas</button>
  </div>

  <!-- Album Page -->
  <div id="page-album" class="page active">
    <div id="stickerContainer" class="section"></div>
  </div>

  <!-- Trocas Page -->
  <div id="page-trocas" class="page">
    <div class="troca-section">
      <div class="troca-card">
        <h3>📦 Minhas Repetidas para Troca</h3>
        <div id="trocaList" class="troca-stickers"></div>
      </div>
      <div class="troca-card">
        <h3>📋 Figurinhas que Preciso</h3>
        <div id="needList" class="troca-stickers"></div>
      </div>
    </div>
  </div>

  <!-- Config Page -->
  <div id="page-config" class="page">
    <div class="config-section">
      <div class="config-card">
        <h3>👤 Perfil</h3>
        <input type="text" class="search-input" id="nameInput" placeholder="Seu nome..." style="width:100%; margin-bottom:8px; border-radius:12px; padding:12px;">
        <button class="config-btn btn-success" onclick="saveName()">💾 Salvar Nome</button>
      </div>
      <div class="config-card">
        <h3>📊 Estatísticas</h3>
        <p style="color:rgba(255,255,255,0.7); font-size:0.9rem;" id="statsDetail">Carregando...</p>
      </div>
      <div class="config-card">
        <h3>💾 Dados</h3>
        <button class="config-btn btn-info" onclick="exportData()">📤 Exportar Dados</button>
        <button class="config-btn btn-info" onclick="importData()">📥 Importar Dados</button>
        <button class="config-btn btn-danger" onclick="resetAlbum()">🗑️ Resetar Álbum</button>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" id="modalTitle">Figurinha</div>
      <div class="modal-sticker-info">
        <div class="modal-sticker-preview" id="modalPreview"></div>
        <div>
          <p id="modalDesc" style="color:rgba(255,255,255,0.8); font-size:0.9rem;"></p>
          <p id="modalStatus" style="margin-top:8px; font-weight:600;"></p>
        </div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn btn-colar" onclick="stickerAction('colada')">✅ Marcar como Colada</button>
        <button class="modal-btn btn-repetida" onclick="stickerAction('repetida')">🔄 Tenho Repetida</button>
        <button class="modal-btn btn-remover" onclick="stickerAction('faltando')">❌ Remover / Falta</button>
        <button class="modal-btn btn-fechar" onclick="closeModalDirect()">Fechar</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // =====================
    // DATA: Copa do Mundo 2026 - Grupos e Seleções
    // =====================
    const COUNTRIES = [
      { id: 'BRA', name: 'Brasil', flag: '🇧🇷', stickers: 18 },
      { id: 'ARG', name: 'Argentina', flag: '🇦🇷', stickers: 18 },
      { id: 'FRA', name: 'França', flag: '🇫🇷', stickers: 18 },
      { id: 'ENG', name: 'Inglaterra', flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿', stickers: 18 },
      { id: 'ESP', name: 'Espanha', flag: '🇪🇸', stickers: 18 },
      { id: 'GER', name: 'Alemanha', flag: '🇩🇪', stickers: 18 },
      { id: 'POR', name: 'Portugal', flag: '🇵🇹', stickers: 18 },
      { id: 'NED', name: 'Holanda', flag: '🇳🇱', stickers: 18 },
      { id: 'ITA', name: 'Itália', flag: '🇮🇹', stickers: 18 },
      { id: 'URU', name: 'Uruguai', flag: '🇺🇾', stickers: 18 },
      { id: 'MEX', name: 'México', flag: '🇲🇽', stickers: 18 },
      { id: 'USA', name: 'EUA', flag: '🇺🇸', stickers: 18 },
      { id: 'CAN', name: 'Canadá', flag: '🇨🇦', stickers: 18 },
      { id: 'MAR', name: 'Marrocos', flag: '🇲🇦', stickers: 18 },
      { id: 'SEN', name: 'Senegal', flag: '🇸🇳', stickers: 18 },
      { id: 'JPN', name: 'Japão', flag: '🇯🇵', stickers: 18 },
      { id: 'KOR', name: 'Coreia do Sul', flag: '🇰🇷', stickers: 18 },
      { id: 'AUS', name: 'Austrália', flag: '🇦🇺', stickers: 18 },
      { id: 'COL', name: 'Colômbia', flag: '🇨🇴', stickers: 18 },
      { id: 'ECU', name: 'Equador', flag: '🇪🇨', stickers: 18 },
      { id: 'CHI', name: 'Chile', flag: '🇨🇱', stickers: 18 },
      { id: 'PER', name: 'Peru', flag: '🇵🇪', stickers: 18 },
      { id: 'VEN', name: 'Venezuela', flag: '🇻🇪', stickers: 18 },
      { id: 'PAR', name: 'Paraguai', flag: '🇵🇾', stickers: 18 },
      { id: 'BOL', name: 'Bolívia', flag: '🇧🇴', stickers: 18 },
      { id: 'CRO', name: 'Croácia', flag: '🇭🇷', stickers: 18 },
      { id: 'BEL', name: 'Bélgica', flag: '🇧🇪', stickers: 18 },
      { id: 'SUI', name: 'Suíça', flag: '🇨🇭', stickers: 18 },
      { id: 'DEN', name: 'Dinamarca', flag: '🇩🇰', stickers: 18 },
      { id: 'POL', name: 'Polônia', flag: '🇵🇱', stickers: 18 },
      { id: 'SWE', name: 'Suécia', flag: '🇸🇪', stickers: 18 },
      { id: 'NOR', name: 'Noruega', flag: '🇳🇴', stickers: 18 },
      { id: 'TUR', name: 'Turquia', flag: '🇹🇷', stickers: 18 },
      { id: 'UKR', name: 'Ucrânia', flag: '🇺🇦', stickers: 18 },
      { id: 'SRB', name: 'Sérvia', flag: '🇷🇸', stickers: 18 },
      { id: 'AUT', name: 'Áustria', flag: '🇦🇹', stickers: 18 },
      { id: 'MEI', name: 'Melhores Momentos', flag: '🏆', stickers: 20 },
      { id: 'EST', name: 'Estádios', flag: '🏟️', stickers: 16 },
    ];

    const AVATARS = ['⚽', '🏆', '🌟', '🦁', '🐉', '🦅', '🔥', '💪', '🎯', '👑'];
    let currentAvatarIndex = 0;

    // =====================
    // STATE
    // =====================
    let albumData = {};
    let currentFilter = 'all';
    let currentSticker = null;
    let currentTab = 'album';

    // =====================
    // INIT
    // =====================
    function init() {
      loadData();
      renderAlbum();
      updateStats();
      updateTrocas();
      updateStatsDetail();
      const savedName = localStorage.getItem('copa2026_name');
      if (savedName) {
        document.getElementById('userName').textContent = savedName;
        document.getElementById('nameInput').value = savedName;
      }
      const savedAvatar = localStorage.getItem('copa2026_avatar');
      if (savedAvatar) {
        currentAvatarIndex = parseInt(savedAvatar);
        document.getElementById('avatarDisplay').textContent = AVATARS[currentAvatarIndex];
      }
    }

    function loadData() {
      const saved = localStorage.getItem('copa2026_album');
      if (saved) {
        albumData = JSON.parse(saved);
      } else {
        albumData = {};
        COUNTRIES.forEach(c => {
          for (let i = 1; i <= c.stickers; i++) {
            albumData[`${c.id}_${i}`] = 'faltando';
          }
        });
        saveData();
      }
    }

    function saveData() {
      localStorage.setItem('copa2026_album', JSON.stringify(albumData));
    }

    // =====================
    // RENDER
    // =====================
    function renderAlbum() {
      const container = document.getElementById('stickerContainer');
      const searchVal = document.getElementById('searchInput').value.toLowerCase();
      container.innerHTML = '';

      COUNTRIES.forEach(country => {
        const stickers = [];
        for (let i = 1; i <= country.stickers; i++) {
          const key = `${country.id}_${i}`;
          const status = albumData[key] || 'faltando';
          if (currentFilter !== 'all' && status !== currentFilter) return;
          if (searchVal && !country.name.toLowerCase().includes(searchVal) && !`${country.id}${i}`.toLowerCase().includes(searchVal)) return;
          stickers.push({ key, i, status });
        }

        if (stickers.length === 0) return;

        const coladas = Object.keys(albumData).filter(k => k.startsWith(country.id + '_') && albumData[k] === 'colada').length;
        const total = country.stickers;

        const group = document.createElement('div');
        group.className = 'country-group';
        group.innerHTML = `
          <div class="country-header">
            <span class="country-flag">${country.flag}</span>
            <span class="country-name">${country.name}</span>
            <span class="country-progress">${coladas}/${total}</span>
          </div>
          <div class="sticker-grid" id="grid_${country.id}"></div>
        `;
        container.appendChild(group);

        const grid = document.getElementById(`grid_${country.id}`);
        stickers.forEach(({ key, i, status }) => {
          const div = document.createElement('div');
          div.className = `sticker ${status}`;
          div.onclick = () => openModal(key, country, i);

          const repeatedCount = status === 'repetida' ? (albumData[key + '_count'] || 1) : 0;

          div.innerHTML = `
            <span class="sticker-flag">${country.flag}</span>
            <span class="sticker-number">${i}</span>
            <span class="sticker-name">${country.id}</span>
            ${status === 'repetida' ? `<span class="sticker-badge">${repeatedCount}</span>` : ''}
          `;
          grid.appendChild(div);
        });
      });

      if (container.innerHTML === '') {
        container.innerHTML = `<div class="empty-state"><div class="emoji">🔍</div><p>Nenhuma figurinha encontrada</p></div>`;
      }
    }

    // =====================
    // STATS
    // =====================
    function updateStats() {
      let coladas = 0, faltando = 0, repetidas = 0, total = 0;
      COUNTRIES.forEach(c => {
        for (let i = 1; i <= c.stickers; i++) {
          total++;
          const status = albumData[`${c.id}_${i}`] || 'faltando';
          if (status === 'colada') coladas++;
          else if (status === 'faltando') faltando++;
          else if (status === 'repetida') repetidas++;
        }
      });

      document.getElementById('totalColadas').textContent = coladas;
      document.getElementById('totalFaltando').textContent = faltando;
      document.getElementById('totalRepetidas').textContent = repetidas;
      const pct = total > 0 ? Math.round((coladas / total) * 100) : 0;
      document.getElementById('totalPercent').textContent = pct + '%';
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = `${coladas} de ${total} figurinhas coladas`;

      if (coladas === total && total > 0) {
        confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
      }
    }

    function updateStatsDetail() {
      let coladas = 0, faltando = 0, repetidas = 0, total = 0;
      COUNTRIES.forEach(c => {
        for (let i = 1; i <= c.stickers; i++) {
          total++;
          const status = albumData[`${c.id}_${i}`] || 'faltando';
          if (status === 'colada') coladas++;
          else if (status === 'faltando') faltando++;
          else if (status === 'repetida') repetidas++;
        }
      });
      const pct = total > 0 ? Math.round((coladas / total) * 100) : 0;
      document.getElementById('statsDetail').innerHTML = `
        Total de figurinhas: ${total}<br>
        Coladas: ${coladas} (${pct}%)<br>
        Faltando: ${faltando}<br>
        Repetidas: ${repetidas}<br>
        Países/Seções: ${COUNTRIES.length}
      `;
    }

    // =====================
    // TROCAS
    // =====================
    function updateTrocas() {
      const trocaList = document.getElementById('trocaList');
      const needList = document.getElementById('needList');
      trocaList.innerHTML = '';
      needList.innerHTML = '';

      let hasRepetidas = false;
      let hasFaltando = false;

      COUNTRIES.forEach(c => {
        for (let i = 1; i <= c.stickers; i++) {
          const key = `${c.id}_${i}`;
          const status = albumData[key] || 'faltando';
          if (status === 'repetida') {
            hasRepetidas = true;
            const chip = document.createElement('span');
            chip.className = 'troca-sticker-chip';
            chip.textContent = `${c.flag} ${c.id}-${i}`;
            trocaList.appendChild(chip);
          }
          if (status === 'faltando') {
            hasFaltando = true;
            const chip = document.createElement('span');
            chip.className = 'troca-sticker-chip';
            chip.style.background = '#6B7280';
            chip.textContent = `${c.flag} ${c.id}-${i}`;
            needList.appendChild(chip);
          }
        }
      });

      if (!hasRepetidas) trocaList.innerHTML = '<p style="color:rgba(255,255,255,0.5); font-size:0.85rem;">Nenhuma repetida ainda</p>';
      if (!hasFaltando) needList.innerHTML = '<p style="color:rgba(255,255,255,0.5); font-size:0.85rem;">Álbum completo! 🎉</p>';
    }

    // =====================
    // MODAL
    // =====================
    function openModal(key, country, num) {
      currentSticker = key;
      const status = albumData[key] || 'faltando';
      const statusLabels = { colada: '✅ Colada', faltando: '❌ Faltando', repetida: '🔄 Repetida' };

      document.getElementById('modalTitle').textContent = `${country.flag} ${country.name} #${num}`;
      document.getElementById('modalPreview').innerHTML = `<span style="font-size:2rem">${country.flag}</span><span style="font-size:1.2rem;font-weight:800;">${num}</span>`;
      document.getElementById('modalDesc').textContent = `Figurinha ${country.id}-${num} — ${country.name}`;
      document.getElementById('modalStatus').textContent = `Status: ${statusLabels[status] || status}`;
      document.getElementById('modalStatus').style.color = status === 'colada' ? '#22C55E' : status === 'repetida' ? '#3B82F6' : '#9CA3AF';

      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
    }

    function closeModalDirect() {
      document.getElementById('modalOverlay').classList.remove('open');
      currentSticker = null;
    }

    function stickerAction(action) {
      if (!currentSticker) return;
      albumData[currentSticker] = action;
      saveData();
      renderAlbum();
      updateStats();
      updateTrocas();
      updateStatsDetail();
      closeModalDirect();

      const msgs = { colada: '✅ Figurinha colada!', repetida: '🔄 Marcada como repetida!', faltando: '❌ Removida do álbum' };
      showToast(msgs[action]);

      if (action === 'colada') {
        confetti({ particleCount: 50, spread: 60, origin: { y: 0.7 }, colors: ['#009C3B', '#FFDF00', '#002776'] });
      }
    }

    // =====================
    // FILTER & SEARCH
    // =====================
    function setFilter(filter) {
      currentFilter = filter;
      document.getElementById('filterAll').style.background = filter === 'all' ? 'var(--verde)' : 'rgba(255,255,255,0.15)';
      document.getElementById('filterMissing').style.background = filter === 'faltando' ? 'var(--verde)' : 'rgba(255,255,255,0.15)';
      document.getElementById('filterDupe').style.background = filter === 'repetida' ? 'var(--verde)' : 'rgba(255,255,255,0.15)';
      renderAlbum();
    }

    function filterStickers() {
      renderAlbum();
    }

    // =====================
    // TABS
    // =====================
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`page-${tab}`).classList.add('active');
      event.target.classList.add('active');
      document.getElementById('searchBar').style.display = tab === 'album' ? 'flex' : 'none';
    }

    // =====================
    // AVATAR
    // =====================
    function changeAvatar() {
      currentAvatarIndex = (currentAvatarIndex + 1) % AVATARS.length;
      document.getElementById('avatarDisplay').textContent = AVATARS[currentAvatarIndex];
      localStorage.setItem('copa2026_avatar', currentAvatarIndex);
    }

    // =====================
    // CONFIG
    // =====================
    function saveName() {
      const name = document.getElementById('nameInput').value.trim();
      if (name) {
        document.getElementById('userName').textContent = name;
        localStorage.setItem('copa2026_name', name);
        showToast('✅ Nome salvo!');
      }
    }

    function exportData() {
      const data = {
        album: albumData,
        name: localStorage.getItem('copa2026_name'),
        avatar: localStorage.getItem('copa2026_avatar'),
        exportDate: new Date().toISOString()
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'copa2026_album.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('📤 Dados exportados!');
    }

    function importData() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (data.album) {
              albumData = data.album;
              saveData();
              if (data.name) {
                localStorage.setItem('copa2026_name', data.name);
                document.getElementById('userName').textContent = data.name;
                document.getElementById('nameInput').value = data.name;
              }
              if (data.avatar) {
                localStorage.setItem('copa2026_avatar', data.avatar);
                currentAvatarIndex = parseInt(data.avatar);
                document.getElementById('avatarDisplay').textContent = AVATARS[currentAvatarIndex];
              }
              renderAlbum();
              updateStats();
              updateTrocas();
              updateStatsDetail();
              showToast('📥 Dados importados!');
            }
          } catch (err) {
            showToast('❌ Erro ao importar arquivo');
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function resetAlbum() {
      if (confirm('Tem certeza que deseja resetar todo o álbum? Esta ação não pode ser desfeita.')) {
        albumData = {};
        COUNTRIES.forEach(c => {
          for (let i = 1; i <= c.stickers; i++) {
            albumData[`${c.id}_${i}`] = 'faltando';
          }
        });
        saveData();
        renderAlbum();
        updateStats();
        updateTrocas();
        updateStatsDetail();
        showToast('🗑️ Álbum resetado!');
      }
    }

    // =====================
    // TOAST
    // =====================
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // =====================
    // START
    // =====================
    init();
  </script>
</body>
</html>
